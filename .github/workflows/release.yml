name: Build And Release Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-13
            rid: osx-x64
          - os: macos-14
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Native AOT
        shell: pwsh
        run: |
          $output = Join-Path $PWD "publish/${{ matrix.rid }}"
          dotnet publish .\Markdown2Html.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishAot=true `
            -p:PublishSingleFile=true `
            -o $output
          Get-ChildItem -Path $output -Filter *.pdb -File -ErrorAction SilentlyContinue | Remove-Item -Force

      - name: Archive Binary
        shell: pwsh
        run: |
          $assetName = "Markdown2Html-${{ matrix.rid }}.zip"
          $assetPath = Join-Path $PWD $assetName
          Compress-Archive -Path "./publish/${{ matrix.rid }}/*" -DestinationPath $assetPath -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: Markdown2Html-${{ matrix.rid }}.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show Downloaded Assets
        shell: pwsh
        run: |
          Get-ChildItem -Path ./release-assets -Recurse | Select-Object FullName

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
          generate_release_notes: true